name = "pontil_summary"
version = "1.0.0"
description = "Job summary builder for GitHub Actions"
licences = ["Apache-2.0"]
gleam = ">= 1.14.0"

[repository]
type = "github"
user = "halostatue"
repo = "pontil"
path = "pontil_summary"
tag_prefix = "pontil_summary-"

[[documentation.pages]]
title = "Changelog"
path = "changelog.html"
source = "CHANGELOG.md"

[[links]]
title = "Licence"
href = "https://github.com/halostatue/pontil/blob/main/LICENCE.md"
[[links]]
title = "Security"
href = "https://github.com/halostatue/pontil/blob/main/SECURITY.md"
[[links]]
title = "Code of Conduct"
href = "https://github.com/halostatue/pontil/blob/main/CODE_OF_CONDUCT.md"
[[links]]
title = "Contributing"
href = "https://github.com/halostatue/pontil/blob/main/CONTRIBUTING.md"
[[links]]
title = "Sponsor"
href = "https://github.com/sponsors/halostatue"

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
envoy = ">= 1.1.0 and < 2.0.0"
simplifile = ">= 2.2.0 and < 3.0.0"
pontil_core = ">= 1.0.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
glinter = ">= 2.15.0 and < 3.0.0"

[javascript.deno]
allow_env = true
allow_read = ["gleam.toml", "test"]
allow_write = ["test/_temp"]
